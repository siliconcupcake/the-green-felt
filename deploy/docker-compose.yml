services:
  mongodb:
    image: mongo:7
    container_name: tgf-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: the-green-felt
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.server
    container_name: tgf-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: mongodb://mongodb:27017/the-green-felt
      PORT: "3001"
    depends_on:
      mongodb:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.client
    container_name: tgf-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  mongodb_data:
